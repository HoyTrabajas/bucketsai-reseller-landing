    function calcCommission(plan, billing, modalityId) {
      const base = billing === 'monthly' ? plan.monthly : plan.annualPerMonth;
      const months = new Array(12).fill(0);
      switch (modalityId) {
        case 'A': months[0] = base; break;
        case 'B': months[0] = base * 0.5; months[1] = base * 0.5; months[2] = base * 0.5; break;
        case 'C': for (let i = 0; i < 6; i++) months[i] = base * 0.3; break;
        case 'D1': for (let i = 0; i < 12; i++) months[i] = plan.monthly * 0.1; break;
        case 'D2': for (let i = 0; i < 12; i++) months[i] = plan.monthly * 0.12; break;
        case 'D3': months[0] = plan.annualTotal * 0.15; break;
      }
      return months;
    }

    function useScrollReveal(threshold = 0.1) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
          { threshold, rootMargin: '0px 0px -40px 0px' }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function useCountUp(target, duration = 800) {
      const [val, setVal] = useState(0);
      const prev = useRef(0);
      useEffect(() => {
        const start = prev.current;
        const diff = target - start;
        if (Math.abs(diff) < 1) { setVal(target); prev.current = target; return; }
        const t0 = performance.now();
        let raf;
        function tick(now) {
          const p = Math.min((now - t0) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(start + diff * ease));
          if (p < 1) raf = requestAnimationFrame(tick);
          else prev.current = target;
        }
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [target, duration]);
      return val;
    }

    /* =========================================================
       SCROLL REVEAL WRAPPER
       ========================================================= */
    function Reveal({ children, className = '', delay = 0 }) {
      const [ref, visible] = useScrollReveal();
      return (
        <div
          ref={ref}
          className={className}
          style={{
            opacity: visible ? 1 : 0,
            transform: visible ? 'translateY(0)' : 'translateY(24px)',
            transition: `opacity 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms`,
          }}
        >
          {children}
        </div>
      );
    }

    /* =========================================================
       NETWORK SVG (Hero Background)
       ========================================================= */
    function NetworkSVG() {
      const nodes = [
        {x:8,y:15},{x:22,y:8},{x:38,y:20},{x:55,y:10},{x:72,y:18},{x:88,y:12},
        {x:15,y:40},{x:32,y:50},{x:48,y:38},{x:65,y:45},{x:82,y:35},{x:92,y:48},
        {x:10,y:70},{x:25,y:80},{x:42,y:68},{x:58,y:78},{x:75,y:65},{x:90,y:75},
        {x:20,y:58},{x:50,y:58},{x:68,y:55},{x:35,y:30},{x:78,y:50},{x:5,y:50},
      ];
      const edges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          if (Math.sqrt(dx * dx + dy * dy) < 28) edges.push([i, j]);
        }
      }
      return (
        <svg viewBox="0 0 100 90" className="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMid slice" style={{opacity:0.18}}>
          {edges.map(([a, b], i) => (
            <line key={'e'+i} x1={nodes[a].x} y1={nodes[a].y} x2={nodes[b].x} y2={nodes[b].y}
              stroke="#4F6BFF" strokeWidth="0.25" className="animate-line-pulse"
              style={{ animationDelay: `${i * 0.2}s` }}/>
          ))}
          {nodes.map((n, i) => (
            <circle key={'n'+i} cx={n.x} cy={n.y} r={i % 3 === 0 ? 1.2 : 0.7} fill="#4F6BFF"
              className="animate-float" style={{ animationDelay: `${i * 0.25}s` }}/>
          ))}
        </svg>
      );
    }

      const perClientTotal = monthlyArr.reduce((s, v) => s + v, 0);

      const totalMonths = monthlyArr.map(v => v * clients);

    /* =========================================================
       REGISTRATION FORM
       ========================================================= */
    function RegistrationForm() {
      const { t } = useLang();
      const [form, setForm] = useState({
        name: '', email: '', company: '', country: '', linkedin: '', network: '', message: '', terms: false,
      });
      const [errors, setErrors] = useState({});
      const [status, setStatus] = useState('idle'); // idle | sending | success | error

      const update = (field, value) => {
        setForm(prev => ({ ...prev, [field]: value }));
        if (errors[field]) setErrors(prev => { const n = {...prev}; delete n[field]; return n; });
      };

      const validate = () => {
        const errs = {};
        if (!form.name.trim()) errs.name = t.form.required;
        if (!form.email.trim()) errs.email = t.form.required;
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) errs.email = t.form.invalidEmail;
        if (!form.company.trim()) errs.company = t.form.required;
        if (!form.country) errs.country = t.form.selectCountry;
        if (!form.terms) errs.terms = t.form.acceptTerms;
        return errs;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }

        setStatus('sending');
        try {
          const res = await fetch('https://formsubmit.co/ajax/ruben@hoytrabajas.com', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({
              _subject: 'New BucketsAI Partner Application',
              'Full Name': form.name,
              Email: form.email,
              Company: form.company,
              Country: form.country,
              LinkedIn: form.linkedin || 'Not provided',
              'Network Size': form.network || 'Not specified',
              Message: form.message || 'No message',
            }),
          });
          if (res.ok) setStatus('success');
          else setStatus('error');
        } catch {
          setStatus('error');
        }
      };

      if (status === 'success') {
        return (
          <section id="apply" className="py-20 md:py-28 bg-navy relative grain">
            <div className="relative z-10 max-w-2xl mx-auto px-4 text-center">
              <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-success/20 mb-6">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M12 20l5 5 11-11" stroke="#10B981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <h2 className="font-display font-bold text-3xl md:text-4xl text-white mb-4">{t.form.successTitle}</h2>
              <p className="text-white/70 text-lg">{t.form.successMsg}</p>
            </div>
          </section>
        );
      }

      const inputCls = (field) =>
        `w-full px-4 py-3 rounded-xl border bg-white text-text-dark font-body text-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary ${errors[field] ? 'border-red-400' : 'border-gray-200'}`;

      return (
        <section id="apply" className="py-20 md:py-28 bg-navy relative grain">
          <div className="absolute inset-0 bg-gradient-to-b from-navy via-navy/95 to-navy"/>
          <div className="relative z-10 max-w-2xl mx-auto px-4 sm:px-6">
            <Reveal>
              <div className="text-center mb-10">
                <h2 className="font-display font-bold text-3xl md:text-4xl text-white tracking-tight-heading">{t.form.title}</h2>
                <p className="mt-4 text-white/60 text-lg">{t.form.sub}</p>
              </div>
            </Reveal>

            <Reveal delay={200}>
              <form onSubmit={handleSubmit} className="bg-white rounded-3xl p-6 md:p-10 shadow-card space-y-5">
                {/* Name */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.name} *</label>
                  <input type="text" value={form.name} onChange={e => update('name', e.target.value)} className={inputCls('name')} />
                  {errors.name && <p className="text-red-500 text-xs mt-1">{errors.name}</p>}
                </div>

                {/* Email */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.email} *</label>
                  <input type="email" value={form.email} onChange={e => update('email', e.target.value)} className={inputCls('email')} />
                  {errors.email && <p className="text-red-500 text-xs mt-1">{errors.email}</p>}
                </div>

                {/* Company */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.company} *</label>
                  <input type="text" value={form.company} onChange={e => update('company', e.target.value)} className={inputCls('company')} />
                  {errors.company && <p className="text-red-500 text-xs mt-1">{errors.company}</p>}
                </div>

                {/* Country */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.country} *</label>
                  <select value={form.country} onChange={e => update('country', e.target.value)} className={inputCls('country')}>
                    <option value="">{t.form.selectCountry}</option>
                    {t.form.countries.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  {errors.country && <p className="text-red-500 text-xs mt-1">{errors.country}</p>}
                </div>

                {/* LinkedIn */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.linkedin}</label>
                  <input type="text" value={form.linkedin} onChange={e => update('linkedin', e.target.value)} className={inputCls('linkedin')} />
                </div>

                {/* Network */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.network}</label>
                  <select value={form.network} onChange={e => update('network', e.target.value)} className={inputCls('network')}>
                    <option value="">{t.form.selectNetwork}</option>
                    {t.form.networkOpts.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>

                {/* Message */}
                <div>
                  <label className="block text-sm font-medium text-text-dark mb-1.5">{t.form.message}</label>
                  <textarea value={form.message} onChange={e => update('message', e.target.value)}
                    rows="3" className={inputCls('message')}/>
                </div>

                {/* Terms */}
                <div>
                  <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" checked={form.terms} onChange={e => update('terms', e.target.checked)}
                      className="mt-0.5 w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary"/>
                    <span className="text-sm text-text-gray">{t.form.terms}</span>
                  </label>
                  {errors.terms && <p className="text-red-500 text-xs mt-1">{errors.terms}</p>}
                </div>

                {/* Submit */}
                <button type="submit" disabled={status === 'sending'}
                  className="w-full py-3.5 bg-primary text-white font-semibold rounded-xl shadow-btn hover:bg-primary-dark hover:shadow-btn-hover transition-transform duration-200 hover:scale-[1.01] active:scale-[0.99] disabled:opacity-60 disabled:cursor-not-allowed">
                  {status === 'sending' ? t.form.sending : t.form.submit}
                </button>

                {status === 'error' && (
                  <p className="text-red-500 text-sm text-center">Something went wrong. Please try again.</p>
                )}
              </form>
            </Reveal>
          </div>
        </section>
      );
    }

    /* =========================================================
       FOOTER
       ========================================================= */
    function Footer() {
      const { t } = useLang();
      return (
        <footer className="bg-navy-800 py-12">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex flex-col md:flex-row items-center justify-between gap-8">
              <div className="flex items-center gap-3">
                <img src="./Logo-Bucketsai_new.png" alt="BucketsAI" className="h-7 brightness-0 invert"/>
              </div>
              <div className="flex flex-wrap justify-center gap-6 text-sm text-white/50">
                <a href="#how" className="hover:text-white transition-colors">{t.footer.program}</a>
                <a href="https://buckets-ai.com/pricing" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">{t.footer.pricing}</a>
                <a href="#ai-support" className="hover:text-white transition-colors">{t.footer.support}</a>
                <a href="#" className="hover:text-white transition-colors">{t.footer.privacy}</a>
              </div>
              <div className="flex items-center gap-4">
                {/* LinkedIn */}
                <a href="#" className="text-white/40 hover:text-white transition-colors" aria-label="LinkedIn">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M4.5 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM3 8h3v9H3V8zm5.5 0h2.9v1.2h.04c.4-.76 1.4-1.56 2.9-1.56C17.1 7.64 18 9.6 18 12.2V17h-3v-4.2c0-1-.02-2.3-1.4-2.3s-1.6 1.1-1.6 2.2V17H9V8h-.5z"/></svg>
                </a>
                {/* Twitter/X */}
                <a href="#" className="text-white/40 hover:text-white transition-colors" aria-label="Twitter">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M11.2 8.8L16.8 2h-1.3l-4.9 5.9L6.4 2H2l5.9 8.5L2 18h1.3l5.1-6.2L12.8 18H17L11.2 8.8zm-1.8 2.2l-.6-.8L4 3.2h2l3.8 5.4.6.8L15.6 17h-2l-4.2-6z"/></svg>
                </a>
              </div>
            </div>
            <div className="mt-8 pt-6 border-t border-white/10 text-center">
              <p className="text-sm text-white/30">{t.footer.copy}</p>
            </div>
          </div>
        </footer>
      );
    }

    /* =========================================================
       APP
       ========================================================= */
    function App() {
      const [lang, setLang] = useState('es');
      const t = T[lang];

      return (
        <LangContext.Provider value={{ lang, setLang, t }}>
          <Navbar />
          <Hero />
          <HowItWorks />
          <WhatIsBuckets />
          <Industries />
          <Calculator />
          <ResourceCenter />
          <AISupport />
          <RegistrationForm />
          <Footer />
        </LangContext.Provider>
      );
    }

    /* =========================================================
       RENDER
       ========================================================= */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
